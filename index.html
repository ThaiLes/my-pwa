<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Provision Asset Dashboard</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        /* Base Reset & Industrial Dark Theme */
        body {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            background-color: #1a1c20;
            color: #e2e4e9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Mobile App Container Layout */
        .app-container {
            width: 100%;
            max-width: 412px; 
            background: linear-gradient(180deg, #24272d 0%, #17181c 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            border-left: 1px solid #2d3139;
            border-right: 1px solid #2d3139;
        }

        /* Top Navigation Header Bar */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #2d3139;
            font-size: 14px;
            letter-spacing: 1px;
            color: #8a929e;
            flex-shrink: 0;
        }
        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-text {
            color: #e2e4e9;
            font-weight: bold;
        }

        /* TAB SYSTEM STYLING */
        .tab-navigation {
            display: flex;
            border-bottom: 1px solid #2d3139;
            background-color: #1d2025;
        }
        .tab-btn {
            flex: 1;
            padding: 14px;
            background: none;
            border: none;
            color: #6c7380;
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            color: #ffffff;
            background-color: #24272d;
            border-bottom: 2px solid #ff9e22;
        }

        /* View Panels Visibility Management */
        .view-panel {
            display: none;
        }
        .view-panel.active {
            display: block;
        }

        /* Form Content Layout Container */
        .content {
            padding: 24px 20px;
            flex-grow: 1;
            overflow-y: auto;
        }

        /* Core Section Typography Titles */
        .page-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin: 0 0 12px 0;
            color: #ffffff;
        }
        .divider {
            height: 1px;
            background-color: #2d3139;
            margin-bottom: 28px;
        }
        .section-label {
            font-size: 12px;
            font-weight: bold;
            color: #6c7380;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
            margin-top: 24px;
        }

        /* TextInput Fields Layout */
        .text-input {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid #3f4450;
            border-radius: 6px;
            padding: 14px;
            font-family: inherit;
            font-size: 16px;
            color: #ffffff;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        .text-input:focus {
            border-color: #ff9e22;
            outline: none;
        }

        /* Interactive Scanning Data Field Box */
        .data-display-box {
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px dashed #525866;
            border-radius: 6px;
            padding: 16px;
            font-size: 13px;
            letter-spacing: 0.5px;
            color: #ff9e22; 
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .data-display-box.scanned {
            border-style: solid;
            border-color: #30d158; 
            color: #ffffff;
            background-color: rgba(48, 209, 88, 0.05);
        }

        /* Video Scanner Viewport Container */
        #scanner-container {
            display: none; 
            width: 100%;
            background-color: #000000;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 12px;
            border: 1px solid #3f4450;
        }
        #interactive-video {
            width: 100% !important;
        }

        /* Interactive Select Dropdowns */
        .select-wrapper {
            position: relative;
        }
        .select-input {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid #3f4450;
            border-radius: 6px;
            padding: 14px;
            font-family: inherit;
            font-size: 16px;
            color: #ffffff;
            appearance: none;
            -webkit-appearance: none;
            box-sizing: border-box;
            cursor: pointer;
        }
        .select-wrapper::after {
            content: '▼';
            font-size: 10px;
            color: #6c7380;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* System Configuration Radio Form Controls */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            cursor: pointer;
            color: #e2e4e9;
        }
        .radio-input {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid #525866;
            border-radius: 50%;
            background-color: transparent;
            display: grid;
            place-content: center;
            cursor: pointer;
        }
        .radio-input::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transform: scale(0);
            transition: 110ms transform ease-in-out;
            background-color: #ffffff;
        }
        .radio-input:checked {
            border-color: #ffffff;
        }
        .radio-input:checked::before {
            transform: scale(1);
        }

        /* Main Industrial Action Button */
        .bottom-actions {
            padding: 20px 20px 60px 20px; 
            border-top: 1px solid #2d3139;
            background-color: #17181c;
            flex-shrink: 0;
        }
        .btn-primary {
            width: 100%;
            background: linear-gradient(180deg, #4e535e 0%, #33373f 100%);
            border: 1px solid #525866;
            border-radius: 6px;
            color: #ffffff;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .btn-primary:active {
            background: linear-gradient(180deg, #33373f 0%, #24272d 100%);
        }
        .star-icon {
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header-bar">
            <div class="header-left">
                <span>[⌂]</span>
                <span class="nav-text">ADMIN ADM</span>
            </div>
            <div class="header-right">
                <span>[👤]</span>
            </div>
        </div>

        <div class="tab-navigation">
            <button id="tab-gateway" class="tab-btn active" onclick="switchTab('gateway')">Gateway Configuration</button>
            <button id="tab-asset" class="tab-btn" onclick="switchTab('asset')">Provision Asset</button>
        </div>

        <div id="scanner-container" style="padding: 0 20px; box-sizing: border-box;">
            <div id="interactive-video"></div>
        </div>

        <div id="view-gateway" class="content view-panel active">
            <h1 class="page-title">Config Gateway</h1>
            <div class="divider"></div>

            <div class="section-label">Scan Gateway Housing</div>
            <div id="gateway-display-box" class="data-display-box" onclick="startScanning('gateway')">
                [ TAP TO SCAN GATEWAY QR CODE ]
            </div>

            <div class="section-label">Marina / Yard Name</div>
            <input type="text" id="input-marina-name" class="text-input" placeholder="e.g. Daventry Park Marina">

            <div class="section-label">Total Number of Berths</div>
            <input type="number" id="input-berth-count" class="text-input" placeholder="e.g. 20" min="1" max="100">
            
            <div style="margin-top: 30px;">
                <button class="btn-primary" onclick="saveGatewayConfig()">
                    Save & Initialize Site <span class="star-icon">✦</span>
                </button>
            </div>
        </div>

        <div id="view-asset" class="content view-panel">
            <h1 class="page-title">Provision Asset</h1>
            <div class="divider"></div>

            <div class="section-label">Hardware Identifier</div>
            <div id="asset-display-box" class="data-display-box" onclick="startScanning('asset')">
                [ TAP TO SCAN PUCK QR CODE ]
            </div>

            <div class="section-label">Assign Physical Location</div>
            <div class="select-wrapper">
                <select class="select-input">
                    <option value="" disabled selected>[ Select Berth ]</option>
                    <option value="1">Berth 1</option>
                    <option value="2">Berth 2</option>
                    <option value="3">Berth 3</option>
                    <option value="4">Berth 4</option>
                    <option value="5">Berth 5</option>
                    <option value="6">Berth 6</option>
                    <option value="7">Berth 7</option>
                    <option value="8">Berth 8</option>
                    <option value="9">Berth 9</option>
                    <option value="10">Berth 10</option>
                </select>
            </div>

            <div class="section-label">Utility Type Configuration</div>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="utility" class="radio-input" checked>
                    ) Water Meter
                </label>
                <label class="radio-label">
                    <input type="radio" name="utility" class="radio-input">
                    ) Shore Electricity
                </label>
            </div>

            <div style="margin-top: 30px;">
                <button class="btn-primary" onclick="saveAssetProvision()">
                    Activate Generic Asset <span class="star-icon">✦</span>
                </button>
            </div>
        </div>

    </div>

    <script>
        let html5QrcodeScanner = null;
        let currentScanTarget = null; // Tracks 'gateway' or 'asset'

        // Secure PIN Protection Configuration
        const ADMIN_PIN = "1234"; 

        function switchTab(targetTab) {
            // Stop any active camera scanner tracking sessions before switching tabs
            stopScanning();

            if (targetTab === 'gateway') {
                // Force a simple passcode verification checkpoint
                const enteredPin = prompt("Enter 4-Digit Administrator Security PIN:");
                if (enteredPin !== ADMIN_PIN) {
                    alert("ACCESS DENIED: Invalid Security Credentials.");
                    return;
                }
                
                // Show Gateway View, Hide Asset View
                document.getElementById('view-gateway').classList.add('active');
                document.getElementById('view-asset').classList.remove('active');
                document.getElementById('tab-gateway').classList.add('active');
                document.getElementById('tab-asset').classList.remove('active');
            } else {
                // Show Asset View, Hide Gateway View
                document.getElementById('view-asset').classList.add('active');
                document.getElementById('view-gateway').classList.remove('active');
                document.getElementById('tab-asset').classList.add('active');
                document.getElementById('tab-gateway').classList.remove('active');
            }
        }

        function startScanning(target) {
            currentScanTarget = target;
            const displayBoxId = target === 'gateway' ? 'gateway-display-box' : 'asset-display-box';
            const displayBox = document.getElementById(displayBoxId);
            const scannerContainer = document.getElementById('scanner-container');
            
            scannerContainer.style.display = 'block';
            displayBox.innerText = "[ ACQUIRING HARDWARE CAMERA... ]";

            if (html5QrcodeScanner) {
                try { html5QrcodeScanner.clear(); } catch(e){}
            }

            setTimeout(() => {
                html5QrcodeScanner = new Html5Qrcode("interactive-video");
                
                const cameraConfig = {
                    fps: 10,
                    qrbox: function(viewfinderWidth, viewfinderHeight) {
                        const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
                        const edgeSize = Math.floor(minEdge * 0.65);
                        return { width: edgeSize, height: edgeSize };
                    },
                    videoConstraints: {
                        facingMode: "environment",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                };

                html5QrcodeScanner.start(
                    { facingMode: "environment" }, 
                    cameraConfig,
                    (decodedText) => {
                        // Capture scanned ID into correct display input container
                        displayBox.innerText = `[ SCANNED ID = ${decodedText} ]`;
                        displayBox.classList.add('scanned');
                        stopScanning();
                    },
                    (errorMessage) => {}
                ).catch(err => {
                    console.warn("Retrying with fallback parameters...", err);
                    html5QrcodeScanner.start(
                        { facingMode: "environment" },
                        { fps: 10, qrbox: 250 },
                        (decodedText) => {
                            displayBox.innerText = `[ SCANNED ID = ${decodedText} ]`;
                            displayBox.classList.add('scanned');
                            stopScanning();
                        }
                    ).catch(fallbackErr => {
                        displayBox.innerText = "[ ERROR: INITIALIZATION FAILED ]";
                        scannerContainer.style.display = 'none';
                    });
                });
            }, 300);
        }

        function stopScanning() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById('scanner-container').style.display = 'none';
                }).catch(err => {
                    document.getElementById('scanner-container').style.display = 'none';
                });
            }
        }

        function saveGatewayConfig() {
            const marinaName = document.getElementById('input-marina-name').value;
            const berthCount = document.getElementById('input-berth-count').value;
            
            if(!marinaName || !berthCount) {
                alert("ERROR: Missing site infrastructure parameters.");
                return;
            }
            alert(`SUCCESS:\nInitializing ${marinaName} with ${berthCount} asset slots.`);
        }

        function saveAssetProvision() {
            alert("SUCCESS: Generic device profile provisioned cleanly.");
        }
    </script>
</body>
</html>
