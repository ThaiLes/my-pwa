<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Ledger Test Bench</title>
    <style>
        body { font-family: monospace; background: #1a1c20; color: #e2e4e9; padding: 20px; text-align: center; }
        button { display: block; width: 100%; max-width: 300px; margin: 20px auto; padding: 15px; font-weight: bold; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; }
        #log { background: #000; color: #0f0; padding: 15px; text-align: left; max-width: 500px; margin: 20px auto; white-space: pre-wrap; font-size: 12px; min-height: 100px; border-radius: 4px; border: 1px solid #333; }
    </style>
</head>
<body>

    <h2>Supabase HIL Test Bench (Clean Slate)</h2>
    <p>Targeting default public schema ledger lines</p>

    <button onclick="sendTestGateway()" style="background: #2ea043; color: white;">1. SEND TEST GATEWAY</button>
    <button onclick="sendTestAsset()" style="background: #0076d6; color: white;">2. SEND TEST ASSET</button>

    <h3>Console Output Log:</h3>
    <div id="log">Awaiting action...</div>

 <script>
    const SUPABASE_URL = "https://mzmvsyewpmaqwcfnqaas.supabase.co/rest/v1";
    const PUBLIC_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16bXZzeWV3cG1hcXdjZm5xYWFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMDM2MDcsImV4cCI6MjA5ODg3OTYwN30.DrQ483mzPm57vYacCZ9IIazOJnuh_E037AI7UMdE-vk";

    function logMessage(msg) {
        document.getElementById('log').innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
    }

    // BUTTON 1: TARGET PUBLIC SCHEMA EXPLICITLY
    function sendTestGateway() {
        logMessage("Transmitting Gateway to public.site_registry...");
        
        const payload = {
            gateway_id: "GW-CLEAN-SLATE-100", // Changed from 99 to 100
            marina_name: "Fresh Start Marina",
            max_berth_slots: 12
        };

        fetch(`${SUPABASE_URL}/site_registry`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "apikey": PUBLIC_TOKEN,
                "Authorization": `Bearer ${PUBLIC_TOKEN}`,
                "Accept-Profile": "api",    // <-- Sync to your live api schema
                "Content-Profile": "api"   // <-- Sync to your live api schema
            },
            body: JSON.stringify(payload)
        })
        .then(res => {
            if (!res.ok) throw new Error(`HTTP Error ${res.status}`);
            logMessage("SUCCESS: Gateway saved into public table registry!");
        })
        .catch(err => {
            logMessage(`FAILED: ${err.message}`);
        });
    }

    // BUTTON 2: TARGET PUBLIC SCHEMA EXPLICITLY
    function sendTestAsset() {
        logMessage("Transmitting Asset to public.asset_ledger...");

        const payload = {
            berth_id: 2,                     // Changed from 1 to 2
            gateway_id: "GW-CLEAN-SLATE-100", // Match the parent ID above
            puck_id: "PUCK-FRESH-2",         // Changed from 1 to 2
            utility_type: "Water Meter"
        };

        fetch(`${SUPABASE_URL}/asset_ledger`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "apikey": PUBLIC_TOKEN,
                "Authorization": `Bearer ${PUBLIC_TOKEN}`,
                "Accept-Profile": "api",    // <-- Sync to your live api schema
                "Content-Profile": "api"   // <-- Sync to your live api schema
            },
            body: JSON.stringify(payload)
        })
        .then(res => {
            if (!res.ok) throw new Error(`HTTP Error ${res.status}`);
            logMessage("SUCCESS: Asset mapped onto public asset ledger!");
        })
        .catch(err => {
            logMessage(`FAILED: ${err.message}`);
        });
    }
</script>   
</body>
</html>
