<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Ledger Test Bench</title>
    <style>
        body { font-family: monospace; background: #1a1c20; color: #e2e4e9; padding: 20px; text-align: center; }
        button { display: block; width: 100%; max-width: 300px; margin: 20px auto; padding: 15px; font-weight: bold; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; color: white; }
        #log { background: #000; color: #0f0; padding: 15px; text-align: left; max-width: 500px; margin: 20px auto; white-space: pre-wrap; font-size: 12px; min-height: 150px; border-radius: 4px; border: 1px solid #333; }
    </style>
</head>
<body>

    <h2>Supabase HIL Test Bench (Clean Slate)</h2>
    <p>Targeting default public schema ledger lines</p>

    <button onclick="sendTestGateway()" style="background: #2ea043;">1. SEND TEST GATEWAY</button>
    <button onclick="sendTestAsset()" style="background: #0076d6;">2. SEND TEST ASSET</button>

    <div id="log">Console Ready... Waiting for input activation.</div>

    <script>
        const SUPABASE_URL = "https://mzmvsyewpmaqwcfnqaas.supabase.co/rest/v1";
        const PUBLIC_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16bXZzeWV3cG1hcXdjZm5xYWFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMDM2MDcsImV4cCI6MjA5ODg3OTYwN30.DrQ483mzPm57vYacCZ9IIazOJnuh_E037AI7UMdE-vk";

        function logMessage(msg) {
            const logDiv = document.getElementById("log");
            logDiv.innerText = `[${new Date().toLocaleTimeString()}] ${msg}\n` + logDiv.innerText;
        }

        // BUTTON 1: PROVISION SITE GATEWAY
        function sendTestGateway() {
            logMessage("Transmitting Gateway payload to public.site_registry...");

            const payload = {
                gateway_id: "GW-MARINA-02",
                marina_name: "MANGO MARINA", // Unified matching string identifier
                max_berth_slots: 50
            };

            fetch(`${SUPABASE_URL}/site_registry`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "apikey": PUBLIC_TOKEN,
                    "Authorization": `Bearer ${PUBLIC_TOKEN}`,
                    
                    // 💡 FIXED: Pointing explicitly to your public schema profile structures
                    "Accept-Profile": "public", 
                    "Content-Profile": "public",
                    "Prefer": "resolution=merge-duplicates, return=representation"
                },
                body: JSON.stringify(payload)
            })
            .then(async (res) => {
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.message || `HTTP Error ${res.status}`);
                }
                logMessage(`SUCCESS: Gateway saved! Server Echo:\n${JSON.stringify(data)}`);
            })
            .catch(err => {
                logMessage(`FAILED: ${err.message}`);
                console.error(err);
            });
        }

        // BUTTON 2: PROVISION HARDWARE ASSET
        function sendTestAsset() {
            logMessage("Transmitting Asset payload to public.asset_ledger...");

            const payload = {
                berth_id: 1,
                gateway_id: "GW-MARINA-02",
                puck_id: "2462",
                utility_type: "Electricity"
            };

            fetch(`${SUPABASE_URL}/asset_ledger`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "apikey": PUBLIC_TOKEN,
                    "Authorization": `Bearer ${PUBLIC_TOKEN}`,
                    
                    // 💡 FIXED: Pointing explicitly to your public schema profile structures
                    "Accept-Profile": "public",
                    "Content-Profile": "public",
                    "Prefer": "resolution=merge-duplicates, return=representation"
                },
                body: JSON.stringify(payload)
            })
            .then(async (res) => {
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.message || `HTTP Error ${res.status}`);
                }
                logMessage(`SUCCESS: Asset mapped into Ledger!\n${JSON.stringify(data)}`);
            })
            .catch(err => {
                logMessage(`FAILED: ${err.message}`);
                console.error(err);
            });
        }
    </script>
</body>
</html>
