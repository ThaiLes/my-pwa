<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Ledger Test Bench</title>
    <style>
        body { font-family: monospace; background: #1a1c20; color: #e2e4e9; padding: 20px; text-align: center; }
        button { display: block; width: 100%; max-width: 300px; margin: 20px auto; padding: 15px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #log { background: #000; color: #0f0; padding: 15px; text-align: left; max-width: 500px; margin: 20px auto; white-space: pre-wrap; font-size: 12px; min-height: 100px; }
    </style>
</head>
<body>

    <h2>Supabase HIL Test Bench</h2>
    <p>Testing direct browser-to-cloud ledger writes</p>

    <button onclick="sendTestGateway()" style="background: #2ea043; color: white;">1. SEND TEST GATEWAY</button>
    <button onclick="sendTestAsset()" style="background: #0076d6; color: white;">2. SEND TEST ASSET</button>

    <h3>Console Output Log:</h3>
    <div id="log">Awaiting action...</div>

<script>
    // Target the root REST configuration directory map
    const DIAGNOSTIC_URL = "https://mzmvsyewpmaqwcfnqaas.supabase.co/rest/v1/";
    const TEST_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16bXZzeWV3cG1hcXdjZm5xYWFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMDM2MDcsImV4cCI6MjA5ODg3OTYwN30.DrQ483mzPm57vYacCZ9IIazOJnuh_E037AI7UMdE-vk";

    function logMessage(msg) {
        document.getElementById('log').innerText = msg;
    }

    // Automatically probe the endpoint structure when the page loads
    window.onload = function() {
        logMessage("Probing API directory map...");

        fetch(DIAGNOSTIC_URL, {
            method: "GET",
            headers: {
                "apikey": TEST_KEY,
                "Authorization": `Bearer ${TEST_KEY}`
            }
        })
        .then(res => {
            if (!res.ok) throw new Error(`Server Map Error: Status ${res.status}`);
            return res.json();
        })
        .then(data => {
            // Grab all available table paths exposed to this key
            const paths = data.paths ? Object.keys(data.paths) : [];
            logMessage(`CONNECTED!\nExposed Endpoint Paths:\n\n${paths.join('\n')}`);
        })
        .catch(err => {
            logMessage(`PROBE FAILED: ${err.message}`);
        });
    }
</script>
</body>
</html>
